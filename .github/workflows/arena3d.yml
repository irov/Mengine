name: Arena3D

on:
  push:
    paths:
      - "examples/arena3d/**"
      - "cmake/Dependencies/CMakeLists.txt"
      - "cmake/Downloads/CMakeLists.txt"
      - "src/Engine/**3D*"
      - "src/Systems/DX11RenderSystem/**"
      - ".github/workflows/arena3d.yml"
  pull_request:
    paths:
      - "examples/arena3d/**"
      - "cmake/Dependencies/CMakeLists.txt"
      - "cmake/Downloads/CMakeLists.txt"
      - "src/Engine/**3D*"
      - "src/Systems/DX11RenderSystem/**"
      - ".github/workflows/arena3d.yml"

jobs:
  deterministic-core:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: irov/kinefix
          ref: 0a3c4e62b0e308e100ad8064c4a96d101d49e5c2
          path: dependencies/kinefix
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure kinefix C tests
        run: cmake -S dependencies/kinefix -B build/kinefix -DCMAKE_BUILD_TYPE=Release -DKINEFIX_BUILD_TESTS=ON
      - name: Build and test kinefix C
        run: cmake --build build/kinefix --config Release --parallel
      - run: ctest --test-dir build/kinefix -C Release --output-on-failure
      - name: Configure
        run: cmake -S examples/arena3d -B build/arena3d -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build/arena3d --config Release --parallel
      - name: Test
        run: ctest --test-dir build/arena3d -C Release --output-on-failure
      - name: Deterministic soak
        shell: bash
        run: build/arena3d/tools/replay/Arena3DReplayTool${{ runner.os == 'Windows' && '.exe' || '' }} --soak 6000

  content-reproducibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python examples/arena3d/tools/arena3d_content.py build
      - run: python examples/arena3d/tools/arena3d_content.py validate
      - run: python examples/arena3d/tools/arena3d_content.py check

  application-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            dependency_source: cmake/Depends_Xcode_MacOS
            dependency_build: build/depends-macos
            app_source: examples/arena3d/cmake/Xcode_MacOS
            app_build: build/arena3d-macos
            generator: Xcode
            target: MacOSApplication
          - os: windows-2022
            dependency_source: cmake/Depends_WIN64_DX11
            dependency_build: build/depends-windows
            app_source: examples/arena3d/cmake/Win64_DX11
            app_build: build/arena3d-windows
            generator: Visual Studio 17 2022
            target: Win32Application
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: irov/kinefix
          ref: 0a3c4e62b0e308e100ad8064c4a96d101d49e5c2
          path: dependencies/kinefix
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure dependencies
        run: cmake -S "${{ matrix.dependency_source }}" -B "${{ matrix.dependency_build }}" -G "${{ matrix.generator }}" -DCMAKE_BUILD_TYPE=Debug ${{ runner.os == 'Windows' && '-A x64' || '' }}
      - name: Build dependencies
        run: cmake --build "${{ matrix.dependency_build }}" --config Debug --parallel
      - name: Configure application
        run: cmake -S "${{ matrix.app_source }}" -B "${{ matrix.app_build }}" -G "${{ matrix.generator }}" ${{ runner.os == 'Windows' && '-A x64' || '' }}
      - name: Build application
        run: cmake --build "${{ matrix.app_build }}" --config Debug --target "${{ matrix.target }}" --parallel
